<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Mania</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0a1f3d url('https://source.unsplash.com/random/1080x1920/?quiz,blue') no-repeat center center fixed; 
      background-size: cover; 
      color: white; 
      text-align: center; 
      padding: 20px; 
      margin: 0; 
      min-height: 100vh;
    }
    h1 { color: #00bfff; margin-bottom: 10px; }
    #welcomeScreen, #gameScreen, #endScreen {
      max-width: 500px;
      margin: 0 auto;
    }
    button { 
      display: block; 
      width: 90%; 
      margin: 12px auto; 
      padding: 16px; 
      font-size: 18px; 
      background: #0066cc;        /* Blue buttons */
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer;
    }
    button:active { background: #00bfff; transform: scale(0.98); }
    
    .option-btn {
      background: white;           /* White option tabs */
      color: #0a1f3d; 
      font-weight: bold;
    }
    .option-btn:active { background: #e6f0ff; }

    #score, #timer { font-size: 22px; margin: 15px 0; font-weight: bold; }
    #question { font-size: 24px; margin: 25px 0; line-height: 1.4; }
    #result { font-size: 20px; margin: 20px 0; min-height: 30px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Welcome Screen -->
  <div id="welcomeScreen">
    <h1>🎉 Quiz Mania</h1>
    <p style="font-size:20px;">Test your knowledge with fresh questions every time!</p>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="hidden">
    <div id="score">Score: 0 / 10</div>
    <div id="timer">Time: 15s</div>
    <div id="question">Loading question...</div>
    <div id="options"></div>
    <div id="result"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next Question</button>
  </div>

  <!-- End Screen -->
  <div id="endScreen" class="hidden">
    <h1>Quiz Complete! 🎊</h1>
    <div id="finalScore" style="font-size:28px; margin:30px 0;"></div>
    <button onclick="restartQuiz()">Try Again</button>
    <button onclick="shareScore()">Share Your Score</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let score = 0;
    let currentQuestionIndex = 0;
    let questions = [];
    let timerInterval = null;
    let timeLeft = 15;

    const welcomeScreen = document.getElementById('welcomeScreen');
    const gameScreen = document.getElementById('gameScreen');
    const endScreen = document.getElementById('endScreen');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const resultEl = document.getElementById('result');
    const nextBtn = document.getElementById('nextBtn');
    const finalScoreEl = document.getElementById('finalScore');

    // Fetch 10 random questions
    async function loadQuestions() {
      try {
        const response = await fetch('https://opentdb.com/api.php?amount=10&type=multiple');
        const data = await response.json();
        questions = data.results;
      } catch (e) {
        questionEl.textContent = "Sorry, couldn't load questions. Check your internet and try again.";
      }
    }

    function startQuiz() {
      score = 0;
      currentQuestionIndex = 0;
      welcomeScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      endScreen.classList.add('hidden');
      loadQuestions().then(() => {
        showQuestion();
      });
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        endQuiz();
        return;
      }

      clearInterval(timerInterval);
      timeLeft = 15;
      timerEl.textContent = `Time: ${timeLeft}s`;

      const q = questions[currentQuestionIndex];
      questionEl.textContent = q.question.replace(/&quot;/g, '"').replace(/&#039;/g, "'").replace(/&amp;/g, '&');

      optionsEl.innerHTML = '';
      resultEl.textContent = '';
      nextBtn.classList.add('hidden');

      const allAnswers = [...q.incorrect_answers, q.correct_answer];
      allAnswers.sort(() => Math.random() - 0.5); // Shuffle

      allAnswers.forEach(answer => {
        const btn = document.createElement('button');
        btn.classList.add('option-btn');
        btn.textContent = answer.replace(/&quot;/g, '"').replace(/&#039;/g, "'").replace(/&amp;/g, '&');
        btn.onclick = () => selectAnswer(btn, answer, q.correct_answer);
        optionsEl.appendChild(btn);
      });

      // Start 15-second timer
      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timeUp();
        }
      }, 1000);
    }

    function selectAnswer(clickedBtn, selected, correct) {
      clearInterval(timerInterval);
      const allBtns = optionsEl.getElementsByTagName('button');
      for (let btn of allBtns) btn.disabled = true;

      if (selected === correct) {
        score++;
        resultEl.innerHTML = "✅ Correct!";
        resultEl.style.color = "lime";
        clickedBtn.style.background = "#00cc00";
      } else {
        resultEl.innerHTML = `❌ Wrong! Correct: ${correct}`;
        resultEl.style.color = "red";
        clickedBtn.style.background = "#ff4444";
      }

      scoreEl.textContent = `Score: ${score} / 10`;
      nextBtn.classList.remove('hidden');
    }

    function timeUp() {
      const allBtns = optionsEl.getElementsByTagName('button');
      for (let btn of allBtns) btn.disabled = true;

      resultEl.innerHTML = "⏰ Time's up!";
      resultEl.style.color = "orange";
      nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestionIndex++;
      showQuestion();
    }

    function endQuiz() {
      clearInterval(timerInterval);
      gameScreen.classList.add('hidden');
      endScreen.classList.remove('hidden');
      finalScoreEl.textContent = `You scored ${score} out of 10!`;
    }

    function restartQuiz() {
      endScreen.classList.add('hidden');
      welcomeScreen.classList.remove('hidden');
    }

    function shareScore() {
      const shareText = `I scored ${score}/10 in Quiz Mania! 🎉 Can you beat me? Play now:`;
      const shareUrl = window.location.href;   // your hosted link

      // Telegram share (if supported)
      if (tg.share) {
        tg.share();
      } else {
        // Fallback: Open Telegram share link
        const tgShareLink = `https://t.me/share/url?url=\( {encodeURIComponent(shareUrl)}&text= \){encodeURIComponent(shareText)}`;
        window.open(tgShareLink, '_blank');
      }
    }

    // Fix: Prevent score going above 10
    // (Already handled by stopping at 10 questions)
  </script>
</body>
</html>
